# ── Project identity ──────────────────────────────────────────────────────────
sonar.projectKey=tradumust
sonar.projectName=TraduMust
sonar.projectVersion=0.1.0

# ── Source roots ──────────────────────────────────────────────────────────────
# Next.js app + shared libs + Chrome extension
sonar.sources=app,lib,components,extension/content,extension/background,extension/popup,extension/sidepanel,backend
sonar.tests=tests

# ── Language settings ─────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Python
sonar.python.coverage.reportPaths=coverage/python-coverage.xml
sonar.python.version=3.11

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  .venv/**,\
  coverage/**,\
  **/*.min.js,\
  extension/content/vocab-10k.js,\
  backend/ml/trained_model.pkl,\
  tests/results/**

sonar.test.exclusions=\
  node_modules/**,\
  .next/**

# ── SonarQube server ──────────────────────────────────────────────────────────
sonar.host.url=http://localhost:9000
sonar.token=squ_tradumust_local

# ── Quality gate ──────────────────────────────────────────────────────────────
sonar.qualitygate.wait=true
