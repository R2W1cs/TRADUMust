<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRADUMUST Avatar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      border-radius: 16px;
    }

    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      background: linear-gradient(160deg, #0d0a1a 0%, #1a0d35 50%, #0d1a35 100%);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    /* Header bar */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(139,92,246,0.3);
      flex-shrink: 0;
      cursor: move;
      user-select: none;
    }
    #header-left { display: flex; align-items: center; gap: 7px; }
    #brand { font-size: 12px; font-weight: 700; color: #a78bfa; }
    #status-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 20px; padding: 2px 8px; font-size: 10px; color: #86efac;
    }
    #status-pill.idle {
      background: rgba(100,116,139,0.15); border-color: rgba(100,116,139,0.3);
      color: #64748b;
    }
    #status-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
      animation: pulse 1.5s infinite;
    }
    #status-dot.idle { background: #475569; animation: none; }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }
    #close-btn {
      background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; border-radius: 6px; width: 22px; height: 22px;
      font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    #close-btn:hover { background: rgba(239,68,68,0.4); }

    /* Three.js canvas area */
    #canvas-container {
      flex: 1; position: relative; overflow: hidden;
    }
    #three-canvas { display: block; width: 100%; height: 100%; }

    /* Transcript bar */
    #transcript-bar {
      background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.08);
      padding: 8px 12px; flex-shrink: 0; min-height: 48px;
    }
    #current-sign {
      font-size: 11px; font-weight: 600; color: #a78bfa;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px;
      min-height: 14px;
    }
    #transcript-text {
      font-size: 12px; color: #e2e8f0; line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #transcript-text.interim { color: #94a3b8; font-style: italic; }

    /* Loading overlay */
    #loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      background: rgba(13,10,26,0.9);
    }
    .spinner {
      width: 32px; height: 32px; border: 2px solid rgba(139,92,246,0.3);
      border-top-color: #7c3aed; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #7c3aed; font-size: 12px; }

    /* Error state */
    #error-box {
      display: none; position: absolute; bottom: 50px; left: 10px; right: 10px;
      background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4);
      border-radius: 8px; padding: 8px 10px; font-size: 11px; color: #fca5a5;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-left">
      <span>🌉</span>
      <span id="brand">TRADUMUST</span>
      <div id="status-pill" class="idle">
        <span id="status-dot" class="idle"></span>
        <span id="status-label">Starting...</span>
      </div>
    </div>
    <button id="close-btn" title="Close interpreter">✕</button>
  </div>

  <div id="canvas-container">
    <canvas id="three-canvas"></canvas>
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading avatar...</p>
    </div>
    <div id="error-box"></div>
  </div>

  <div id="transcript-bar">
    <div id="current-sign"></div>
    <div id="transcript-text" class="idle">Waiting for speech...</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// ── Sign dictionary (subset — key words for meetings) ──────────────────────
const H = Math.PI * 0.5;
const Q = Math.PI * 0.25;
const E = Math.PI * 0.15;
const F = Math.PI * 0.6;

// arm + hand poses: [boneName, x, y, z]
const POSES = {
  REST: [
    ["mixamorigRightArm", 0, 0, 0],
    ["mixamorigRightForeArm", 0, 0, 0],
    ["mixamorigRightHand", 0, 0, 0],
  ],
  HELLO: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.5],
    ["mixamorigRightArm", -Q * 0.3, 0, -H * 0.7],
    ["mixamorigRightForeArm", H * 0.5, 0, 0],
    ["mixamorigRightHand", 0, Q * 0.3, 0],
    ["mixamorigRightHandIndex1", 0, 0, 0],
    ["mixamorigRightHandMiddle1", 0, 0, 0],
    ["mixamorigRightHandRing1", 0, 0, 0],
    ["mixamorigRightHandPinky1", 0, 0, 0],
    ["mixamorigRightHandThumb1", 0, 0, -Q],
  ],
  THANK_YOU: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.3],
    ["mixamorigRightArm", -Q * 0.4, 0, -H * 0.5],
    ["mixamorigRightForeArm", H * 0.8, 0, 0],
    ["mixamorigRightHand", Q * 0.3, 0, 0],
    ["mixamorigRightHandIndex1", 0, 0, 0],
    ["mixamorigRightHandMiddle1", 0, 0, 0],
  ],
  YES: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.3],
    ["mixamorigRightArm", 0, 0, -H * 0.5],
    ["mixamorigRightForeArm", H * 0.9, 0, 0],
    ["mixamorigRightHand", -Q * 0.4, 0, 0],
    ["mixamorigRightHandIndex1", F, 0, 0],
    ["mixamorigRightHandMiddle1", F, 0, 0],
    ["mixamorigRightHandRing1", F, 0, 0],
    ["mixamorigRightHandPinky1", F, 0, 0],
    ["mixamorigRightHandThumb1", 0, 0, Q * 0.3],
  ],
  NO: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.3],
    ["mixamorigRightArm", 0, 0, -H * 0.5],
    ["mixamorigRightForeArm", H * 0.8, 0, 0],
    ["mixamorigRightHandIndex1", 0, 0, 0],
    ["mixamorigRightHandMiddle1", 0, 0, 0],
    ["mixamorigRightHandRing1", F, 0, 0],
    ["mixamorigRightHandPinky1", F, 0, 0],
    ["mixamorigRightHandThumb1", 0, 0, -E],
  ],
  PLEASE: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.2],
    ["mixamorigRightArm", -Q * 0.3, 0, -H * 0.3],
    ["mixamorigRightForeArm", H * 1.1, 0, 0],
    ["mixamorigRightHand", 0, 0, 0],
    ["mixamorigRightHandIndex1", 0, 0, 0],
    ["mixamorigRightHandMiddle1", 0, 0, 0],
    ["mixamorigRightHandRing1", 0, 0, 0],
    ["mixamorigRightHandPinky1", 0, 0, 0],
    ["mixamorigRightHandThumb1", 0, 0, -Q],
  ],
  HELP: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.3],
    ["mixamorigRightArm", -Q * 0.4, 0, -H * 0.5],
    ["mixamorigRightForeArm", H * 0.5, 0, 0],
    ["mixamorigRightHandIndex1", F, 0, 0],
    ["mixamorigRightHandMiddle1", F, 0, 0],
    ["mixamorigRightHandRing1", F, 0, 0],
    ["mixamorigRightHandPinky1", F, 0, 0],
    ["mixamorigRightHandThumb1", 0, 0, -Q * 0.5],
  ],
  WHERE: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.5],
    ["mixamorigRightArm", 0, 0, -H * 0.6],
    ["mixamorigRightForeArm", H * 0.8, 0, 0],
    ["mixamorigRightHand", 0, Q * 0.5, 0],
    ["mixamorigRightHandIndex1", 0, 0, 0],
    ["mixamorigRightHandMiddle1", F, 0, 0],
    ["mixamorigRightHandRing1", F, 0, 0],
    ["mixamorigRightHandPinky1", F, 0, 0],
  ],
  UNDERSTAND: [
    ["mixamorigRightShoulder", 0, 0, Q * 0.5],
    ["mixamorigRightArm", -Q * 0.5, 0, -H * 0.7],
    ["mixamorigRightForeArm", H * 0.6, 0, 0],
    ["mixamorigRightHandIndex1", 0, 0, 0],
    ["mixamorigRightHandMiddle1", F, 0, 0],
    ["mixamorigRightHandRing1", F, 0, 0],
    ["mixamorigRightHandPinky1", F, 0, 0],
    ["mixamorigRightHandThumb1", 0, 0, Q * 0.5],
  ],
};

// Word → pose name mapping (covers common meeting phrases)
const WORD_SIGN_MAP = {
  "hello": "HELLO", "hi": "HELLO", "hey": "HELLO",
  "thank": "THANK_YOU", "thanks": "THANK_YOU",
  "yes": "YES", "yeah": "YES", "correct": "YES", "right": "YES",
  "no": "NO", "nope": "NO", "not": "NO",
  "please": "PLEASE",
  "help": "HELP",
  "where": "WHERE",
  "understand": "UNDERSTAND", "understood": "UNDERSTAND", "got": "UNDERSTAND",
};

// ── Three.js Setup ─────────────────────────────────────────────────────────
const canvas = document.getElementById("three-canvas");
const container = document.getElementById("canvas-container");
const loadingEl = document.getElementById("loading");
const errorBox = document.getElementById("error-box");
const statusDot = document.getElementById("status-dot");
const statusLabel = document.getElementById("status-label");
const statusPill = document.getElementById("status-pill");
const currentSignEl = document.getElementById("current-sign");
const transcriptEl = document.getElementById("transcript-text");

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = null; // transparent

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 1.2, 2.2);
camera.lookAt(0, 0.8, 0);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(2, 4, 3);
dirLight.castShadow = true;
scene.add(dirLight);
const fillLight = new THREE.PointLight(0x7c3aed, 0.6);
fillLight.position.set(-2, 2, -1);
scene.add(fillLight);

// Resize handler
function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
const resizeObs = new ResizeObserver(resize);
resizeObs.observe(container);

// ── Avatar state ──────────────────────────────────────────────────────────
let boneMap = new Map();
let avatar = null;
let signQueue = [];
let currentPose = null;
let poseTimer = 0;
let idlePhase = 0;
const LERP = 8;
const clock = new THREE.Clock();

function buildBoneMap(scene3d) {
  boneMap.clear();
  scene3d.traverse((obj) => {
    if (obj.isBone) boneMap.set(obj.name, obj);
  });
}

function applyPoseLerp(poseKey, dt) {
  const pose = POSES[poseKey];
  if (!pose) return;
  const lf = Math.min(1, dt * LERP);
  for (const [name, x, y, z] of pose) {
    const bone = boneMap.get(name);
    if (!bone) continue;
    bone.rotation.x = THREE.MathUtils.lerp(bone.rotation.x, x, lf);
    bone.rotation.y = THREE.MathUtils.lerp(bone.rotation.y, y, lf);
    bone.rotation.z = THREE.MathUtils.lerp(bone.rotation.z, z, lf);
  }
}

// ── GLB Loader ─────────────────────────────────────────────────────────────
// Points to the Next.js app's public folder (running on port 1234)
const MODEL_URL = "http://localhost:1234/models/xbot.glb";

const loader = new GLTFLoader();
loader.load(
  MODEL_URL,
  (gltf) => {
    avatar = gltf.scene;
    avatar.scale.setScalar(0.01);
    avatar.position.set(0, -1, 0);
    scene.add(avatar);
    buildBoneMap(avatar);
    loadingEl.style.display = "none";
    setStatus("listening");
  },
  (xhr) => {
    const pct = Math.round((xhr.loaded / (xhr.total || 1)) * 100);
    const p = loadingEl.querySelector("p");
    if (p) p.textContent = `Loading avatar... ${pct}%`;
  },
  (err) => {
    loadingEl.style.display = "none";
    showError("Failed to load avatar model. Check network connection.");
    console.error("[TRADUMUST] GLTF load error:", err);
  }
);

// ── Animation loop ─────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  idlePhase += dt * 0.8;

  if (avatar && boneMap.size > 0) {
    // Idle breathing
    const spine = boneMap.get("mixamorigSpine");
    if (spine) spine.rotation.x = Math.sin(idlePhase) * 0.005;
    const head = boneMap.get("mixamorigHead");
    if (head) head.rotation.y = Math.sin(idlePhase * 0.4) * 0.03;

    // Sign queue
    if (signQueue.length > 0 && poseTimer <= 0) {
      const { poseKey, holdMs, label } = signQueue[0];
      signQueue.shift();
      currentPose = poseKey;
      poseTimer = holdMs / 1000;
      currentSignEl.textContent = label || poseKey.replace(/_/g, " ");
    }

    if (poseTimer > 0) {
      poseTimer -= dt;
      if (currentPose) applyPoseLerp(currentPose, dt);
    } else {
      applyPoseLerp("REST", dt);
      if (signQueue.length === 0) currentSignEl.textContent = "";
    }
  }

  renderer.render(scene, camera);
}
animate();

// ── Text → sign queue builder ─────────────────────────────────────────────
function textToSignQueue(text) {
  const words = text.toLowerCase().replace(/[^a-z\s]/g, "").split(/\s+/).filter(Boolean);
  const queue = [];
  for (const word of words) {
    const poseKey = WORD_SIGN_MAP[word];
    if (poseKey) {
      queue.push({ poseKey, holdMs: 600, label: word.toUpperCase() });
      queue.push({ poseKey: "REST", holdMs: 200, label: "" });
    }
  }
  return queue;
}

// ── Messages from content script ─────────────────────────────────────────
window.addEventListener("message", (event) => {
  const { type, text, settings } = event.data ?? {};

  switch (type) {
    case "INIT":
      if (settings?.avatarModel === "ybot") {
        // Swap model URL for ybot
        // In production: re-load the GLTF with the ybot URL
      }
      setStatus("listening");
      break;

    case "TRANSCRIPT_INTERIM":
      transcriptEl.textContent = text;
      transcriptEl.className = "interim";
      break;

    case "TRANSCRIPT_FINAL": {
      transcriptEl.textContent = text;
      transcriptEl.className = "";
      const newQueue = textToSignQueue(text);
      if (newQueue.length > 0) {
        signQueue = [...signQueue, ...newQueue];
      }
      break;
    }

    case "SETTINGS_UPDATE":
      if (settings) applySettings(settings);
      break;

    case "RECOGNITION_STATUS":
      if (event.data.status === "listening") setStatus("listening");
      else if (event.data.status === "stopped") setStatus("idle");
      break;

    case "ERROR":
      showError(text || "An error occurred.");
      break;
  }
});

// Notify content script overlay is ready
window.parent.postMessage({ type: "OVERLAY_READY" }, "*");

// ── UI helpers ─────────────────────────────────────────────────────────────
function setStatus(state) {
  if (state === "listening") {
    statusPill.className = "";
    statusDot.className = "";
    statusLabel.textContent = "Listening";
  } else {
    statusPill.className = "idle";
    statusDot.className = "idle";
    statusLabel.textContent = "Idle";
  }
}

function showError(msg) {
  errorBox.style.display = "block";
  errorBox.textContent = "⚠️ " + msg;
  setTimeout(() => { errorBox.style.display = "none"; }, 5000);
}

function applySettings(s) {
  // Position / size handled by content script re-injecting the frame
  if (s.overlayPosition || s.overlaySize) {
    window.parent.postMessage({ type: "REQUEST_RESIZE", settings: s }, "*");
  }
}

// ── Close button ───────────────────────────────────────────────────────────
document.getElementById("close-btn").addEventListener("click", () => {
  window.parent.postMessage({ type: "REQUEST_STOP" }, "*");
});
</script>
</body>
</html>
